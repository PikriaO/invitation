<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .active {
      opacity: 1;
    }

    .text {
      position: absolute;
      bottom: 20%;
      left: 10%;
      color: white;
      font-size: 24px;
      background: rgba(0,0,0,0.4);
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 80%;
    }

    @media (max-width: 600px) {
      .text {
        font-size: 18px;
        bottom: 15%;
      }
    }
  </style>
</head>

<body>

<div class="slider">
  <div class="slide active">
    <img src="img1.jpg" />
    <div class="text">Our first moment ❤️</div>
  </div>

  <div class="slide">
     <img src="img2.jpg" />
    <div class="text">Forever starts here 💍</div>
  </div>

  <div class="slide">
     <img src="img2.jpg" />
    <div class="text">Love, laughter, and us ✨</div>
  </div>
</div>

<script>
  let slides = document.querySelectorAll('.slide');
  let index = 0;

  function showNextSlide() {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
  }

  setInterval(showNextSlide, 3000); // change every 3 sec
</script>

</body>
</html>
